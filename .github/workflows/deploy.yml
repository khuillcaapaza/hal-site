name: Build and deploy to HestiaCP

on:
  # Publish on every push to the main branch.
  push:
    branches: [main]
  # Allow running the workflow manually from the Actions tab.
  workflow_dispatch:

# Allow only one deployment at a time; let an in-progress run finish.
concurrency:
  group: deploy-hestia
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        # Served at the domain root (hospitalantoniolorena.gob.pe), so no base path.
        env:
          NEXT_PUBLIC_BASE_PATH: ""
          # API de citas: el sitio consume cronogramas en vivo desde aquí.
          NEXT_PUBLIC_API_BASE: "https://citas.hospitalantoniolorena.gob.pe/api"
          # API de convocatorias: lectura pública en vivo (listados y detalle).
          NEXT_PUBLIC_CONVOCATORIAS_API: "https://convocatorias.hospitalantoniolorena.gob.pe"

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HESTIA_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy over SFTP (mirror)
        # The hosting account is SFTP-only (no remote shell), so we mirror the
        # build output with lftp over SFTP. --delete removes stale files, so
        # HESTIA_TARGET_PATH must point at the site's dedicated public_html.
        # `-u "user,"` passes the username with an empty password; auth is done
        # by the SSH key inside sftp:connect-program.
        #
        # PDFs are NOT versioned in Git (see .gitignore): they are uploaded once
        # to public_html and served from the server. `-X '*.pdf'` excludes them
        # from the mirror so --delete never removes the manually-uploaded files
        # and the build never needs to ship them.
        #
        # `documentos/` holds ONLY server-managed PDFs and has no generated HTML
        # in out/, so it must be excluded as a whole directory (`-x`); otherwise
        # --delete tries to remove the non-empty (PDF-only) folder and hangs over
        # SFTP. convocatorias/ and oficinas/ are safe because they DO contain
        # generated HTML pages in out/.
        run: |
          lftp -u "${{ secrets.HESTIA_USER }}," "sftp://${{ secrets.HESTIA_HOST }}" -e "
            set sftp:connect-program 'ssh -a -x -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null -i ~/.ssh/id_deploy -p ${{ secrets.HESTIA_SSH_PORT }}';
            set net:max-retries 2;
            set net:timeout 20;
            mirror -R --delete -X '*.pdf' -x '^documentos/' -x '^files-api/' --parallel=4 --verbose ./out/ '${{ secrets.HESTIA_TARGET_PATH }}';
            bye
          "

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/id_deploy
